<template>
    <div class="gauge-wrapper">
        <svg viewBox="0 0 200 115" xmlns="http://www.w3.org/2000/svg"
             class="gauge-svg" role="img" aria-label={ariaLabel}>
            <!-- Background track -->
            <path d="M 20 100 A 80 80 0 0 0 180 100"
                  fill="none" stroke="#e0e5ee" stroke-width="18" stroke-linecap="round"/>
            <!-- Score fill -->
            <template lwc:if={hasFill}>
                <path d={fillPath}
                      fill="none" stroke={fillColor} stroke-width="18" stroke-linecap="round"
                      class="gauge-fill"/>
            </template>
            <!-- End caps / tick marks -->
            <circle cx="20" cy="100" r="4" fill="#c9d0de"/>
            <circle cx="180" cy="100" r="4" fill="#c9d0de"/>
            <!-- Score number -->
            <text x="100" y="75" text-anchor="middle" dominant-baseline="middle"
                  class="score-number">{displayScore}</text>
            <!-- Grade letter -->
            <text x="100" y="97" text-anchor="middle" dominant-baseline="middle"
                  class="grade-letter">{grade}</text>
        </svg>
        <p class="gauge-label">{label}</p>
    </div>
</template>
